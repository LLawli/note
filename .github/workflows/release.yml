# Release pipeline. A `v*.*.*` tag compiles the binary once per target, packages
# it many ways (tarball/zip + .deb/.rpm) — "compile once, repackage many" — and
# publishes a GitHub Release with checksums and the CHANGELOG section.
#
# Cut a release with:  git tag v0.1.0 && git push origin v0.1.0
# A manual run (workflow_dispatch) builds the matrix only (no release), to test
# the cross-compiles without side effects.

name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    steps:
      - uses: actions/checkout@v5

      - name: Install pinned toolchain
        run: rustup show

      - name: Add target
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: rustup target add ${{ matrix.target }}

      # rusqlite bundles SQLite (C), so the Linux ARM cross-build needs a cross
      # C toolchain + linker; this action wires CC/AR/linker for the target.
      - name: Cross toolchain (linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p note-cli

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          dist="note-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/note" "$dist"/
          cp README.md CHANGELOG.md LICENSE-MIT LICENSE-APACHE "$dist"/
          tar -czf "${dist}.tar.gz" "$dist"
          shasum -a 256 "${dist}.tar.gz" > "${dist}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          dist="note-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/note.exe" "$dist"/
          cp README.md CHANGELOG.md LICENSE-MIT LICENSE-APACHE "$dist"/
          7z a "${dist}.zip" "$dist" >/dev/null
          sha256sum "${dist}.zip" > "${dist}.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            note-*.tar.gz*
            note-*.zip*

  # .deb + .rpm for both Linux arches, from the same prebuilt binaries.
  packages:
    name: nfpm (deb + rpm)
    needs: [build, release]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          pattern: "*-unknown-linux-gnu"
          path: dist
      - name: Install nfpm
        run: |
          url=$(curl -sSfL https://api.github.com/repos/goreleaser/nfpm/releases/latest \
            | grep -o 'https://[^"]*_amd64\.deb' | head -1)
          curl -sSfL "$url" -o nfpm.deb
          sudo dpkg -i nfpm.deb
      - name: Build packages and attach to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sudo apt-get update && sudo apt-get install -y gettext-base
          export NFPM_VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p out
          build() { # rust-arch nfpm-arch
            local t="$1-unknown-linux-gnu"
            tar -xzf "dist/${t}/note-${GITHUB_REF_NAME}-${t}.tar.gz"
            export NFPM_ARCH="$2" NFPM_BIN="note-${GITHUB_REF_NAME}-${t}/note"
            # nfpm doesn't env-expand `contents.src`, so render the config first.
            envsubst < packaging/nfpm.yaml.tmpl > nfpm.yaml
            nfpm package -f nfpm.yaml -p deb -t out/
            nfpm package -f nfpm.yaml -p rpm -t out/
          }
          build x86_64 amd64
          build aarch64 arm64
          ls -l out/
          gh release upload "$GITHUB_REF_NAME" out/*.deb out/*.rpm --clobber

  release:
    name: publish GitHub Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Assemble release notes + flatten artifacts
        run: |
          ver="${GITHUB_REF_NAME#v}"
          mkdir -p release
          find artifacts -type f \( -name 'note-*' -o -name '*.deb' -o -name '*.rpm' \) -exec cp {} release/ \;
          # Extract this version's CHANGELOG section (Keep a Changelog).
          awk -v hdr="## [$ver]" '
            index($0, hdr) == 1 { flag = 1; next }
            flag && index($0, "## [") == 1 { exit }
            flag { print }
          ' CHANGELOG.md > notes.md
          [ -s notes.md ] || echo "See [CHANGELOG.md](CHANGELOG.md)." > notes.md
          {
            echo
            echo "### Checksums"
            echo '```'
            cat release/*.sha256 2>/dev/null || true
            echo '```'
          } >> notes.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          files: release/*

  # Renders the Homebrew formula from the released tarballs' checksums and pushes
  # it to the `homebrew-tap` repo over SSH using a write-scoped deploy key. Gated
  # on the `HOMEBREW_TAP` repo variable; the key lives in the
  # `HOMEBREW_TAP_DEPLOY_KEY` secret. (To disable, unset the variable.)
  homebrew:
    name: update Homebrew tap
    needs: [build, release]
    if: startsWith(github.ref, 'refs/tags/') && vars.HOMEBREW_TAP == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with: { path: dl }
      - name: Render formula
        run: |
          sudo apt-get update && sudo apt-get install -y gettext-base
          export VERSION="${GITHUB_REF_NAME#v}"
          export HOMEPAGE="https://github.com/${GITHUB_REPOSITORY}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          sha() { cut -d' ' -f1 "dl/$1/note-${GITHUB_REF_NAME}-$1.tar.gz.sha256"; }
          export URL_MAC="${base}/note-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz"
          export SHA_MAC="$(sha aarch64-apple-darwin)"
          export URL_LINUX_X64="${base}/note-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz"
          export SHA_LINUX_X64="$(sha x86_64-unknown-linux-gnu)"
          export URL_LINUX_ARM="${base}/note-${GITHUB_REF_NAME}-aarch64-unknown-linux-gnu.tar.gz"
          export SHA_LINUX_ARM="$(sha aarch64-unknown-linux-gnu)"
          envsubst < packaging/note.rb.tmpl > note.rb
          cat note.rb
      - name: Push to the tap
        env:
          DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o IdentitiesOnly=yes"
          git clone "git@github.com:${GITHUB_REPOSITORY_OWNER}/homebrew-tap.git" tap
          install -D note.rb tap/Formula/note.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/note.rb
          git diff --cached --quiet || git commit -m "note ${GITHUB_REF_NAME}"
          git push
